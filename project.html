<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPSB | Project Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --accent: #EAB308;
            --bg-dark: #0A0A0B;
            --text-main: #F4F4F5;
            --border-dim: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        .glass {
            background: rgba(20, 20, 21, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-dim);
        }

        /* Markdown Styles */
        .markdown-body {
            color: #d1d5db;
            line-height: 1.6;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        .markdown-body h1 { font-size: 2.5rem; text-transform: uppercase; color: var(--accent); }
        .markdown-body h2 { font-size: 1.75rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
        .markdown-body h3 { font-size: 1.25rem; }
        .markdown-body p { margin-bottom: 1.25rem; }
        .markdown-body a { color: var(--accent); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body pre { background: #141415; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }
        .markdown-body code { font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; color: #a1a1aa; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.25rem; }
        .markdown-body li { margin-bottom: 0.5rem; }
        .markdown-body blockquote { border-left: 4px solid var(--accent); padding-left: 1rem; color: #9ca3af; margin-bottom: 1.5rem; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
        .markdown-body th, .markdown-body td { border: 1px solid rgba(255,255,255,0.1); padding: 0.75rem; text-align: left; }
        .markdown-body th { background-color: rgba(255,255,255,0.05); }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 100px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 glass">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold mono text-yellow-500 tracking-tighter">PREET_PRATAP_</a>
            <div class="flex space-x-8 text-[10px] font-bold uppercase tracking-[0.3em]">
                <a href="javascript:history.back()" class="text-white hover:text-yellow-500 transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Back
                </a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="pt-32 pb-24 px-6 min-h-screen">
        <div class="max-w-4xl mx-auto">
            <div id="loading" class="loader"></div>
            <div id="error" class="hidden text-red-500 text-center mono my-20">
                // ERROR: UNABLE_TO_FETCH_DATA
            </div>
            <div id="content" class="markdown-body hidden">
                <!-- Markdown content will be injected here -->
            </div>
        </div>
    </main>

    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');

        if (!fileName) {
            document.getElementById('loading').classList.add('hidden');
            const errorEl = document.getElementById('error');
            errorEl.classList.remove('hidden');
            errorEl.innerText = "// ERROR: NO_FILE_SPECIFIED";
        } else {
            // Fetch the markdown file
            fetch(fileName)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                })
                .then(text => {
                    // Hide loader
                    document.getElementById('loading').classList.add('hidden');
                    
                    // Parse and display markdown
                    const contentEl = document.getElementById('content');
                    contentEl.innerHTML = marked.parse(text);
                    contentEl.classList.remove('hidden');
                })
                .catch(error => {
                    console.error('Error fetching markdown:', error);
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('error').classList.remove('hidden');
                });
        }
    </script>
</body>
</html>
